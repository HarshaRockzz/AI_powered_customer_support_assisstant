# Keep cloud services active by querying their REST APIs daily.
# Prevents the free-tier projects from being paused due to inactivity.
#
# Supabase Secrets: SUPABASE_URL, SUPABASE_ANON_KEY
# Qdrant Secrets: QDRANT_URL, QDRANT_API_KEY

name: Keep Services Active

on:
  schedule:
    # Run daily at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allow manual run for verification

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/ping_db.py

      - name: Ping Qdrant API
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python scripts/ping_qdrant.py
