# Keep Supabase project active by querying the REST API daily.
# Prevents the free-tier project from being paused due to inactivity.
#
# Required: Add SUPABASE_URL and SUPABASE_ANON_KEY secrets in repo Settings > Secrets and variables > Actions
# SUPABASE_URL: e.g. https://your-project-ref.supabase.co
# SUPABASE_ANON_KEY: Your project's anon/public key

name: Keep Supabase Active

on:
  schedule:
    # Run daily at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allow manual run for verification

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/ping_db.py
